<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaipur Junction - Live Train Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container-fluid {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .header .subtitle {
            font-size: 22px;
            margin-top: 8px;
            opacity: 0.95;
            font-weight: 400;
        }

        .language-indicator {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            margin: 0;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        thead th {
            padding: 25px 20px;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        tbody tr {
            transition: all 0.3s ease;
            border-bottom: 2px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 22px 20px;
            font-size: 28px;
            text-align: center;
            color: #2c3e50;
            font-weight: 500;
        }

        tbody td:first-child {
            font-weight: 700;
            color: #667eea;
            font-size: 30px;
        }

        tbody td:nth-child(2) {
            text-align: left;
            font-size: 26px;
        }

        .time-cell {
            color: #f39c12;
            font-weight: 700;
            font-size: 30px;
        }

        .platform-cell {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            font-size: 32px;
            border-radius: 8px;
        }

        .arrival-flag {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
            font-size: 28px;
        }

        .departure-flag {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
            font-size: 28px;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            font-size: 28px;
            color: #7f8c8d;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 28px;
            color: #3498db;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 500;
        }

        .last-updated {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }
            
            thead th {
                font-size: 20px;
                padding: 15px 10px;
            }
            
            tbody td {
                font-size: 18px;
                padding: 12px 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="header" style="position: relative;">
            <div class="language-indicator" id="langIndicator">English</div>
            <h1>JAIPUR JUNCTION</h1>
            <div class="subtitle">Live Train Status</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TR NO.</th>
                        <th>TRAIN NAME</th>
                        <th>EXP. TIME</th>
                        <th>A/D</th>
                        <th>PF.</th>
                    </tr>
                </thead>
                <tbody id="trainData">
                    <tr>
                        <td colspan="5" class="loading">
                            <div class="spinner"></div>
                            Loading train data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let isHindi = false;
        let updateInterval;

        function updateLastUpdatedTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-IN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            $('#lastUpdated').text('Last Updated: ' + timeString);
        }

        function getData() {
            $.post("/getTrainData", {
                getData: true
            }, function(data) {
                if (data.error) {
                    $('#trainData').html(`
                        <tr>
                            <td colspan="5" class="error-message">
                                ${data.error}
                            </td>
                        </tr>
                    `);
                    return;
                }

                const trainData = isHindi ? data.data['HIN'] : data.data['ENG'];
                
                $('#langIndicator').text(isHindi ? 'हिंदी' : 'English');

                if (!trainData || trainData.length === 0) {
                    $('#trainData').html(`
                        <tr>
                            <td colspan="5" class="no-data">
                                No trains scheduled in the next 6 hours
                            </td>
                        </tr>
                    `);
                    return;
                }

                let tableContent = '';
                trainData.forEach(function(train) {
                    const adClass = (train.ADFlag === 'A') ? 'arrival-flag' : 'departure-flag';
                    const adText = (train.ADFlag === 'A') ? 'A' : 'D';

                    tableContent += `
                        <tr>
                            <td>${train.trainNo}</td>
                            <td>${train.trainName}</td>
                            <td class="time-cell">${train.expectedTime}</td>
                            <td><span class="${adClass}">${adText}</span></td>
                            <td class="platform-cell">${train.platformNo}</td>
                        </tr>
                    `;
                });

                $('#trainData').html(tableContent);
                updateLastUpdatedTime();

                isHindi = !isHindi;
            }, 'json').fail(function(xhr, status, error) {
                $('#trainData').html(`
                    <tr>
                        <td colspan="5" class="error-message">
                            Connection Error: Unable to fetch train data
                        </td>
                    </tr>
                `);
            });
        }

        $(document).ready(function() {
            getData();
            updateInterval = setInterval(getData, 10000);
        });

        $(window).on('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>

</html>
